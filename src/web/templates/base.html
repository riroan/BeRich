<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BeRich">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <title>{% block title %}BeRich Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    {% include "_header.html" %}
    {% include "_nav.html" %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
    <script>
    async function togglePause() {
        const btn = document.getElementById("pause-btn");
        const isPaused = btn.classList.contains("paused");
        const endpoint = isPaused ? "/api/trading/resume" : "/api/trading/pause";
        const resp = await fetch(endpoint, {method: "POST"});
        const data = await resp.json();
        if (data.paused) { btn.textContent = "PAUSED"; btn.classList.add("paused"); }
        else { btn.textContent = "TRADING"; btn.classList.remove("paused"); }
    }
    </script>
    <script src="/static/script.js?v=2"></script>
    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker
                .register("/sw.js", {scope: "/"})
                .catch((err) => console.warn("[sw] register failed", err));
        });
    }
    </script>
</body>
</html>

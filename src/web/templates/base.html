<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BeRich Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    {% include "_header.html" %}
    {% include "_nav.html" %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
    <script>
    async function togglePause() {
        const btn = document.getElementById("pause-btn");
        const isPaused = btn.classList.contains("paused");
        const endpoint = isPaused ? "/api/trading/resume" : "/api/trading/pause";
        const resp = await fetch(endpoint, {method: "POST"});
        const data = await resp.json();
        if (data.paused) { btn.textContent = "PAUSED"; btn.classList.add("paused"); }
        else { btn.textContent = "TRADING"; btn.classList.remove("paused"); }
    }
    </script>
    <script src="/static/script.js"></script>
</body>
</html>

# Trading Bot Settings

app:
  name: "TradingBot"
  env: "development"  # development, production

# Discord Notifications
discord:
  enabled: true
  webhook_url: "${DISCORD_WEBHOOK_URL}"

# Trading Settings
trading:
  warmup_hours: 0    # Hours to collect data before trading starts
  check_interval: 120  # Price check interval in seconds
  paper_cash_usd: 10000  # Initial paper trading cash (USD)
  paper_cash_krw: 0      # Initial paper trading cash (KRW)
  slippage_buffer_pct: 0.01  # Marketable-limit buffer: BUY +1%, SELL -1%

# Database
database:
  url: "${DATABASE_URL}"

# Risk Management
risk:
  # Money limits are FRACTIONS of account equity (USD), not absolute
  # amounts — currency-correct and auto-scaling with the account.
  max_daily_loss_pct: 0.03         # Halt for the day at -3% of equity
  max_daily_trades: 50             # Maximum trades per day
  max_position_pct: 0.25           # Max 25% of equity per single stock
  max_total_exposure_pct: 1.0      # Max 100% of equity invested
  max_drawdown_pct: 0.15           # 15% of equity (reporting only)

  position_sizing:
    method: "fixed_risk"           # fixed, fixed_risk, kelly
    risk_per_trade: 0.02           # Risk 2% per trade

# Logging
logging:
  level: "${LOG_LEVEL}"
  log_dir: "logs"

# Market Hours
schedule:
  krx:
    start: "09:00"
    end: "15:30"
    timezone: "Asia/Seoul"
  us:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"

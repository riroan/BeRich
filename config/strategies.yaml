# Trading Strategies Configuration

strategies:
  # RSI Mean Reversion Strategy (with Averaging Down & Staged Selling)
  - name: "KRX_RSI_MeanReversion"
    class: "src.strategy.builtin.rsi_mean_reversion.RSIMeanReversionStrategy"
    enabled: false  # 한국 주식 비활성화
    market: "krx"
    symbols:
      - "069500"  # KODEX 200
      - "010120"  # LS ELECTRIC
    params:
      rsi_period: 14
      stop_loss: -10   # Stop loss at -10%

      # Cooldown: reset buy stages after N days
      cooldown_days: 3   # 1일 후 다시 매수 가능

      # Averaging down levels: [RSI threshold, portion]
      avg_down_levels:
        - [35, 0.3]    # 1차 매수: RSI 35, 30%
        - [30, 0.35]   # 2차 매수: RSI 30, 35%
        - [25, 0.35]   # 3차 매수: RSI 25, 35%

      # Staged selling levels: [RSI threshold, portion]
      sell_levels:
        - [70, 0.25]   # 1차 매도: RSI 70, 25%
        - [75, 0.35]   # 2차 매도: RSI 75, 35%
        - [80, 0.4]    # 3차 매도: RSI 80, 40% (나머지 전량)

  # RSI Mean Reversion for NASDAQ Stocks
  - name: "NASDAQ_RSI_MeanReversion"
    class: "src.strategy.builtin.rsi_mean_reversion.RSIMeanReversionStrategy"
    enabled: true
    market: "nasdaq"
    symbols:
      - "AAPL"   # Apple
      - "GOOG"   # Alphabet
      - "NVDA"   # NVIDIA
      - "SOXX"   # Semiconductor ETF
    params:
      rsi_period: 14
      stop_loss: -10
      cooldown_days: 3
      avg_down_levels:
        - [35, 0.3]
        - [30, 0.35]
        - [25, 0.35]
      sell_levels:
        - [70, 0.25]
        - [75, 0.35]
        - [80, 0.4]

  # RSI Mean Reversion for NYSE Stocks (개별주)
  - name: "NYSE_RSI_MeanReversion"
    class: "src.strategy.builtin.rsi_mean_reversion.RSIMeanReversionStrategy"
    enabled: true
    market: "nyse"
    symbols:
      - "KO"     # Coca-Cola
      - "O"      # Realty Income (REIT)
      - "VZ"     # Verizon
      - "WMT"    # Walmart
      - "PEP"    # PepsiCo
      - "JNJ"    # Johnson & Johnson
    params:
      rsi_period: 14
      stop_loss: -10
      cooldown_days: 3
      avg_down_levels:
        - [35, 0.3]
        - [30, 0.35]
        - [25, 0.35]
      sell_levels:
        - [70, 0.25]
        - [75, 0.35]
        - [80, 0.4]

  # RSI Mean Reversion for AMEX/NYSE Arca ETFs
  - name: "AMEX_RSI_MeanReversion"
    class: "src.strategy.builtin.rsi_mean_reversion.RSIMeanReversionStrategy"
    enabled: true
    market: "amex"
    symbols:
      - "SPY"    # S&P 500 ETF (NYSE Arca)
      - "GLD"    # Gold ETF (NYSE Arca)
    params:
      rsi_period: 14
      stop_loss: -10
      cooldown_days: 3
      avg_down_levels:
        - [35, 0.3]
        - [30, 0.35]
        - [25, 0.35]
      sell_levels:
        - [70, 0.25]
        - [75, 0.35]
        - [80, 0.4]

  # Momentum Strategy (disabled)
  - name: "KRX_Momentum"
    class: "src.strategy.builtin.momentum.MomentumStrategy"
    enabled: false
    market: "krx"
    symbols:
      - "005930"
    params:
      rsi_period: 14
      fast_ma: 10
      slow_ma: 20
